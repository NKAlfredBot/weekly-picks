<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfred Intercept</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 48px 32px;
    }
    .header {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 32px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .author {
      font-size: 16px;
      color: #999;
      margin-bottom: 24px;
    }
    .reason {
      font-size: 17px;
      line-height: 1.6;
      color: #bbb;
      margin-bottom: 28px;
    }
    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .badge {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      text-transform: lowercase;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .btn {
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #e8e8e8;
      color: #0a0a0a;
    }
    .btn-primary:hover { background: #fff; }
    .btn-secondary {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
    }
    .btn-secondary:hover { background: #252525; }
    .bypass {
      font-size: 13px;
      color: #444;
      text-decoration: none;
      cursor: pointer;
    }
    .bypass:hover { color: #666; }
    .empty {
      text-align: center;
      padding: 80px 0;
    }
    .empty h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #ccc;
    }
    .empty p {
      color: #666;
      font-size: 16px;
      margin-bottom: 24px;
    }
    .empty a {
      color: #999;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container" id="content"></div>
  <script src="intercept.js"></script>
</body>
</html>
