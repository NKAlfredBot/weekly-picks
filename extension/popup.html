<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      width: 280px;
      padding: 20px;
      background: #111;
      color: #e8e8e8;
    }
    .status {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #999;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4a4;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: #fff;
    }
    .stats {
      font-size: 13px;
      color: #777;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="toggle-row">
    <span class="status" id="statusText">Alfred is watching</span>
    <label class="toggle">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>
  <div class="stats" id="stats"></div>
  <script src="popup.js"></script>
</body>
</html>
